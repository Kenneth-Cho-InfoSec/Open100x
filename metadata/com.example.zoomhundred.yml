AutoName: Open 100x
Summary: Extreme 100x hybrid zoom camera with local image processing
Description: |-
    Open 100x is an Android camera app built to give more phones access to
    extreme 100x zoom-style shooting, even when the stock camera app does not
    expose that kind of range.

    It combines native camera zoom with digital crop to reach up to 100x, and
    adds controls designed for long-range mobile photography, including
    stability feedback, histogram tools, grid modes, zoom presets, flashlight
    support, crop nudging, and local post-processing for extreme zoom captures.

    Open 100x runs fully on-device. It uses traditional, non-AI image processing
    only, with no cloud processing and no external APIs.

